{{- range $ := .Values.externalSecrets }}
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .name }}
spec:
  refreshInterval: {{ .refreshInterval }}
  secretStoreRef:
    name: {{ .secretStoreRef }}
    kind: SecretStore
  target:
    name: {{ .targetSecretName }}
    creationPolicy: Owner
  data:
    {{- range $secretKey, $remoteProperty := .keys }}
    - secretKey: {{ $secretKey }}
      remoteRef:
        key: {{ $.remoteKey }}
        property: {{ $remoteProperty }}
    {{- end }}
{{- end }}
